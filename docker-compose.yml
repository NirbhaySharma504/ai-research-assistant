# Backend + frontend run in containers; Ollama stays NATIVE on the host so it keeps
# GPU access. Containers reach it via host.docker.internal (mapped to the host
# gateway below). Run `ollama serve` + `ollama pull llama3.1:8b` on the host first.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      # Reach the host's native Ollama from inside the container.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      CHROMA_DB_PATH: /data/chroma_db
      SQLITE_DB_PATH: /data/research.db
    volumes:
      - app_data:/data          # persist ChromaDB + SQLite across restarts
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  app_data:
